# ~/.config/antibody/antibody.toml

[defer]
# bundle is the zsh-defer plugin used for kind:defer bundles.
# bundle = "romkatv/zsh-defer"

[fpath]
# rule controls whether fpath entries are appended or prepended.
# Options: append (default), prepend
# rule = "append"

[git]
# domain is the default git hosting domain used for short owner/repo bundle specs.
# domain = "github.com"
# protocol controls the URL scheme used when cloning short owner/repo specs.
# Options: https (default), ssh
# protocol = "https"

[home]
# dir overrides where bundles are cloned. $ANTIBODY_HOME env var takes precedence.
# dir = "~/.cache/antibody"

